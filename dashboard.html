<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Dashboard NPS - URE Caieiras</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#eef2f7;
margin:0;
padding:30px;
color:#2c3e50;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h1{
margin:0;
}

.dashboard{
max-width:1500px;
margin:auto;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:20px;
}

.card{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
text-align:center;
}

.card h2{
font-size:36px;
margin:0;
}

.card span{
color:#777;
}

.legend{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:25px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.filtros{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:25px;
background:white;
padding:15px;
border-radius:10px;
}

select,input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.graficos{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
margin-bottom:30px;
}

.grafico{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.loader{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
z-index:999;
}

</style>

</head>

<body>

<div id="loader" class="loader">Carregando dados...</div>

<div class="dashboard">

<div class="header">
<h1>📊 Dashboard NPS - URE Caieiras</h1>
</div>

<div class="cards">

<div class="card">
<h2 id="media">0</h2>
<span>Média Geral</span>
</div>

<div class="card">
<h2 id="nps">0</h2>
<span>NPS</span>
</div>

<div class="card">
<h2 id="prom">0%</h2>
<span>Promotores</span>
</div>

<div class="card">
<h2 id="det">0%</h2>
<span>Detratores</span>
</div>

</div>

<div class="legend">

<b>📘 Como funciona o NPS</b><br><br>

Promotores → notas <b>9 ou 10</b><br>
Neutros → notas <b>7 ou 8</b><br>
Detratores → notas <b>0 a 6</b><br><br>

<b>NPS = % Promotores − % Detratores</b>

</div>

<div class="filtros">

<select id="filtroMes">
<option value="">Todos os meses</option>
</select>

<select id="filtroNucleo">
<option value="">Todos os núcleos</option>
</select>

<input type="text" id="buscaObs" placeholder="Buscar observação">

<button onclick="exportarCSV()">Exportar CSV</button>

</div>

<div class="graficos">

<div class="grafico">
<canvas id="graficoGauge"></canvas>
</div>

<div class="grafico">
<canvas id="graficoMes"></canvas>
</div>

<div class="grafico">
<canvas id="graficoNucleo"></canvas>
</div>

<div class="grafico">
<canvas id="graficoNotas"></canvas>
</div>

</div>

<table id="tabela" class="display" style="width:100%"></table>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbw5F7YbtnK2IHBrDa44n701fErmknBfbYS5qbvJqTKZK0ZKXZE2xs-HSl0kxYjAxoVD/exec";

let dados=[];
let tabela;
let chartGauge,chartMes,chartNucleo,chartNotas;

fetch(API)
.then(r=>r.json())
.then(json=>{

dados=json.map(d=>({

data:d.Data?new Date(d.Data):null,
nota:Number(d.Nota)||0,
nucleo:d["Núcleo"]||d["Nucleo"]||"Não informado",
obs:d["Observação"]||"",
site:d["Site"]||""

}));

document.getElementById("loader").style.display="none";

inicializarFiltros();
render();

});

function inicializarFiltros(){

let meses=new Set();
let nucleos=new Set();

dados.forEach(d=>{
if(d.data) meses.add(d.data.getMonth()+1);
nucleos.add(d.nucleo);
});

meses.forEach(m=>{
$("#filtroMes").append(`<option value="${m}">Mês ${m}</option>`);
});

nucleos.forEach(n=>{
$("#filtroNucleo").append(`<option value="${n}">${n}</option>`);
});

$("#filtroMes").change(render);
$("#filtroNucleo").change(render);
$("#buscaObs").on("input",render);

}

function filtrar(){

let mes=$("#filtroMes").val();
let nucleo=$("#filtroNucleo").val();
let busca=$("#buscaObs").val().toLowerCase();

return dados.filter(d=>{

if(mes && d.data && (d.data.getMonth()+1)!=mes) return false;
if(nucleo && d.nucleo!=nucleo) return false;
if(busca && !d.obs.toLowerCase().includes(busca)) return false;

return true;

});

}

function render(){

let f=filtrar();

cards(f);
graficoGauge(f);
graficoMes(f);
graficoNucleo(f);
graficoNotas(f);
tabelaDados(f);

}

function cards(f){

if(!f.length) return;

let media=f.reduce((s,d)=>s+d.nota,0)/f.length;

let prom=f.filter(d=>d.nota>=9).length;
let det=f.filter(d=>d.nota<=6).length;

let promP=(prom/f.length)*100;
let detP=(det/f.length)*100;

let nps=promP-detP;

$("#media").text(media.toFixed(1));
$("#prom").text(promP.toFixed(0)+"%");
$("#det").text(detP.toFixed(0)+"%");
$("#nps").text(nps.toFixed(0));

}

function graficoGauge(f){

let prom=f.filter(d=>d.nota>=9).length;
let det=f.filter(d=>d.nota<=6).length;

let promP=(prom/f.length)*100;
let detP=(det/f.length)*100;

let nps=promP-detP;

if(chartGauge) chartGauge.destroy();

chartGauge=new Chart(
document.getElementById("graficoGauge"),
{
type:"doughnut",
data:{
datasets:[{
data:[nps+100,200-(nps+100)],
backgroundColor:["#27ae60","#ecf0f1"]
}]
},
options:{
rotation:-90,
circumference:180,
plugins:{legend:{display:false}}
}
});

}

function graficoMes(f){

let meses={};

f.forEach(d=>{
if(!d.data) return;
let m=d.data.getMonth()+1;
if(!meses[m]) meses[m]=[];
meses[m].push(d.nota);
});

let labels=Object.keys(meses);

let medias=labels.map(m=>{
let arr=meses[m];
return arr.reduce((a,b)=>a+b)/arr.length;
});

if(chartMes) chartMes.destroy();

chartMes=new Chart(
document.getElementById("graficoMes"),
{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Média por mês",
data:medias,
borderColor:"#3498db",
tension:.3
}]
}
});

}

function graficoNucleo(f){

let nucleo={};

f.forEach(d=>{
if(!nucleo[d.nucleo]) nucleo[d.nucleo]=[];
nucleo[d.nucleo].push(d.nota);
});

let labels=Object.keys(nucleo);

let medias=labels.map(n=>{
let arr=nucleo[n];
return arr.reduce((a,b)=>a+b)/arr.length;
});

if(chartNucleo) chartNucleo.destroy();

chartNucleo=new Chart(
document.getElementById("graficoNucleo"),
{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Média por núcleo",
data:medias,
backgroundColor:"#8e44ad"
}]
}
});

}

function graficoNotas(f){

let notas={};

f.forEach(d=>{
if(!notas[d.nota]) notas[d.nota]=0;
notas[d.nota]++;
});

let labels=Object.keys(notas);
let valores=Object.values(notas);

if(chartNotas) chartNotas.destroy();

chartNotas=new Chart(
document.getElementById("graficoNotas"),
{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Distribuição das notas",
data:valores,
backgroundColor:"#3498db"
}]
}
});

}

function tabelaDados(f){

let tableData=f.map(d=>[
d.data?d.data.toLocaleDateString():"-",
d.nucleo,
d.nota,
d.obs||"-",
d.site
]);

if(tabela) tabela.destroy();

tabela=$("#tabela").DataTable({

data:tableData,

columns:[
{title:"Data"},
{title:"Núcleo"},
{title:"Nota"},
{title:"Observação"},
{title:"Site"}
],

pageLength:10,

lengthMenu:[10,25,50,100],

language:{
url:"https://cdn.datatables.net/plug-ins/1.13.6/i18n/pt-BR.json"
}

});

}

function exportarCSV(){

let csv="Data,Nucleo,Nota,Observacao,Site\n";

dados.forEach(d=>{
csv+=`${d.data?d.data.toLocaleDateString():""},${d.nucleo},${d.nota},"${d.obs}",${d.site}\n`;
});

let blob=new Blob([csv]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="dados_nps.csv";

a.click();

}

</script>

</body>
</html>
