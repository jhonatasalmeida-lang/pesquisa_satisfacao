<!DOCTYPE html>

<style>

body {
  margin:0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg, #0f4c81, #1fb6a6);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:16px;
}

.container {
  background:#fff;
  border-radius:18px;
  padding:24px;
  width:100%;
  max-width:820px;
  box-shadow:0 12px 28px rgba(0,0,0,0.25);
}

h1 {
  text-align:center;
  color:#0f4c81;
  margin-bottom:20px;
}

label {
  font-weight:600;
  margin-top:12px;
  display:block;
}

input, select {
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-top:6px;
  font-size:15px;
}

.canvas-box {
  margin-top:16px;
}

canvas {
  width:100%;
  height:220px;
  border:2px dashed #aaa;
  border-radius:10px;
  touch-action: none;
}

.actions {
  display:flex;
  gap:10px;
  margin-top:12px;
}

button {
  flex:1;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
}

.btn-clear { background:#f39c12; color:#fff; }
.btn-send { background:#2ecc71; color:#fff; }
.btn-back { background:#34495e; color:#fff; margin-top:16px; }

.loading-overlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:#fff;
  font-size:18px;
  font-weight:600;
  z-index:9999;
}

.spinner {
  width:50px;
  height:50px;
  border:5px solid #fff;
  border-top:5px solid #1fb6a6;
  border-radius:50%;
  animation:girar 1s linear infinite;
  margin-bottom:15px;
}

@keyframes girar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

</style>
</head>

<label>Visto / Assinatura</label>

<div class="canvas-box">
<canvas id="assinatura"></canvas>
</div>

<div class="actions">
<button class="btn-clear" onclick="limpar()">Limpar</button>
<button class="btn-send" onclick="enviar()">Registrar</button>
</div>

<button class="btn-back" onclick="window.location.href='index.html'">⬅ Voltar</button>

</div>

<div class="loading-overlay" id="overlay">
<div class="spinner"></div>
Enviando registro...
</div>

<script>

const canvas = document.getElementById("assinatura");
const ctx = canvas.getContext("2d");

let desenhando = false;
let assinaturaFeita = false;
let enviando = false;

function resizeCanvas(){
canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

canvas.addEventListener("pointerdown", e=>{
desenhando = true;
ctx.beginPath();
ctx.moveTo(e.offsetX, e.offsetY);
});

canvas.addEventListener("pointermove", e=>{
if(!desenhando) return;
ctx.lineTo(e.offsetX, e.offsetY);
ctx.stroke();
assinaturaFeita = true;
});

canvas.addEventListener("pointerup", ()=> desenhando=false);
canvas.addEventListener("pointerleave", ()=> desenhando=false);

function limpar(){
ctx.clearRect(0,0,canvas.width,canvas.height);
assinaturaFeita=false;
}

function enviar(){

if(enviando) return;

const nome = document.getElementById("nome").value.trim();
const unidade = document.getElementById("unidade").value;

if(!nome || !unidade){
alert("Preencha nome e unidade.");
return;
}

if(!assinaturaFeita){
alert("Por favor, realize a assinatura antes de registrar.");
return;
}

enviando = true;

document.getElementById("overlay").style.display="flex";

const assinatura = canvas.toDataURL("image/jpeg",0.2);

fetch("https://script.google.com/macros/s/AKfycbyyZq4OSr76GPhnitpnallY1jok8aqkL70df3Tv-kgTiooiEMMBSqBKuPnFtN9W6_Ys/exec",{
method:"POST",
mode:"no-cors",
body:new URLSearchParams({
nome:nome,
unidade:unidade,
assinatura:assinatura
})
})
.finally(()=>{
setTimeout(()=>{
window.location.href="index.html";
},800);
});

}

</script>
