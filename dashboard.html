<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard NPS - URE Caieiras</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<style>

body{
font-family:Segoe UI,Arial;
background:#eef1f5;
margin:0;
padding:30px;
color:#2c3e50;
}

h1{
text-align:center;
margin-bottom:25px;
}

.dashboard{
max-width:1400px;
margin:auto;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
border-radius:14px;
padding:25px;
color:white;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
text-align:center;
}

.card h2{
font-size:34px;
margin:0;
}

.card span{
font-size:14px;
opacity:.9;
}

.media{background:#3498db;}
.nps{background:#1abc9c;}
.prom{background:#27ae60;}
.det{background:#e74c3c;}

.filtros{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:25px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

select,input{
padding:8px 10px;
border-radius:6px;
border:1px solid #ccc;
}

.graficos{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
margin-bottom:30px;
}

.grafico{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

table.dataTable{
background:white;
border-radius:10px;
overflow:hidden;
}

.loader{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#ffffff;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
z-index:999;
}

</style>

</head>

<body>

<div class="loader" id="loader">Carregando dados...</div>

<div class="dashboard">

<h1>📊 Dashboard Pesquisa de Satisfação</h1>

<div class="cards">

<div class="card media">
<h2 id="media">0</h2>
<span>Média Geral</span>
</div>

<div class="card nps">
<h2 id="nps">0</h2>
<span>NPS</span>
</div>

<div class="card prom">
<h2 id="prom">0%</h2>
<span>Promotores</span>
</div>

<div class="card det">
<h2 id="det">0%</h2>
<span>Detratores</span>
</div>

</div>

<div class="filtros">

<select id="filtroMes">
<option value="">Todos os meses</option>
</select>

<select id="filtroNucleo">
<option value="">Todos os núcleos</option>
</select>

<input type="text" id="buscaObs" placeholder="Pesquisar observação">

<button onclick="exportarCSV()">Exportar CSV</button>

</div>

<div class="graficos">

<div class="grafico">
<canvas id="graficoNPS"></canvas>
</div>

<div class="grafico">
<canvas id="graficoMes"></canvas>
</div>

<div class="grafico">
<canvas id="graficoNucleo"></canvas>
</div>

</div>

<table id="tabelaDados">

<thead>
<tr>
<th>Data</th>
<th>Núcleo</th>
<th>Nota</th>
<th>Observação</th>
<th>Site</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbw5F7YbtnK2IHBrDa44n701fErmknBfbYS5qbvJqTKZKXZE2xs-HSl0kxYjAxoVD/exec";

let dados=[];
let chartMes;
let chartNucleo;
let chartNPS;
let tabela;

fetch(API)
.then(r=>r.json())
.then(json=>{

dados=json.map(d=>({

data:new Date(d.Data || ""),
nota:Number(d.Nota || 0),
nucleo:d["Núcleo"] || d["Nucleo"] || "Não informado",
obs:d["Observação"] || d["Observacao"] || "",
site:d["Site"] || ""

}));

document.getElementById("loader").style.display="none";

inicializarFiltros();
render();

});

function inicializarFiltros(){

const meses=new Set();
const nucleos=new Set();

dados.forEach(d=>{
meses.add(d.data.getMonth()+1);
nucleos.add(d.nucleo);
});

meses.forEach(m=>{
$("#filtroMes").append(`<option value="${m}">Mês ${m}</option>`);
});

nucleos.forEach(n=>{
$("#filtroNucleo").append(`<option value="${n}">${n}</option>`);
});

$("#filtroMes").change(render);
$("#filtroNucleo").change(render);
$("#buscaObs").on("input",render);

}

function filtrar(){

const mes=$("#filtroMes").val();
const nucleo=$("#filtroNucleo").val();
const busca=$("#buscaObs").val().toLowerCase();

return dados.filter(d=>{

if(mes && (d.data.getMonth()+1)!=mes) return false;
if(nucleo && d.nucleo!=nucleo) return false;
if(busca && !d.obs.toLowerCase().includes(busca)) return false;

return true;

});

}

function render(){

const f=filtrar();

cards(f);
graficoNPS(f);
graficoMes(f);
graficoNucleo(f);
tabelaDados(f);

}

function cards(f){

if(f.length==0)return;

let media=f.reduce((s,d)=>s+d.nota,0)/f.length;

let prom=f.filter(d=>d.nota>=9).length;
let det=f.filter(d=>d.nota<=6).length;

let promP=(prom/f.length)*100;
let detP=(det/f.length)*100;

let nps=promP-detP;

$("#media").text(media.toFixed(1));
$("#prom").text(promP.toFixed(0)+"%");
$("#det").text(detP.toFixed(0)+"%");
$("#nps").text(nps.toFixed(0));

}

function graficoNPS(f){

let prom=f.filter(d=>d.nota>=9).length;
let neut=f.filter(d=>d.nota>=7 && d.nota<=8).length;
let det=f.filter(d=>d.nota<=6).length;

if(chartNPS)chartNPS.destroy();

chartNPS=new Chart(
document.getElementById("graficoNPS"),
{
type:"doughnut",
data:{
labels:["Promotores","Neutros","Detratores"],
datasets:[{
data:[prom,neut,det],
backgroundColor:["#27ae60","#f1c40f","#e74c3c"]
}]
}
});

}

function graficoMes(f){

const meses={};

f.forEach(d=>{
let m=d.data.getMonth()+1;
if(!meses[m])meses[m]=[];
meses[m].push(d.nota);
});

const labels=Object.keys(meses);

const medias=labels.map(m=>{
let arr=meses[m];
return arr.reduce((a,b)=>a+b)/arr.length;
});

if(chartMes)chartMes.destroy();

chartMes=new Chart(
document.getElementById("graficoMes"),
{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Média por mês",
data:medias,
borderColor:"#3498db",
tension:.3
}]
}
});

}

function graficoNucleo(f){

const nucleo={};

f.forEach(d=>{
if(!nucleo[d.nucleo])nucleo[d.nucleo]=[];
nucleo[d.nucleo].push(d.nota);
});

const labels=Object.keys(nucleo);

const medias=labels.map(n=>{
let arr=nucleo[n];
return arr.reduce((a,b)=>a+b)/arr.length;
});

if(chartNucleo)chartNucleo.destroy();

chartNucleo=new Chart(
document.getElementById("graficoNucleo"),
{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Média por núcleo",
data:medias,
backgroundColor:"#8e44ad"
}]
}
});

}

function tabelaDados(f){

const tbody=$("#tabela");
tbody.html("");

f.forEach(d=>{

tbody.append(`
<tr>
<td>${d.data.toLocaleDateString()}</td>
<td>${d.nucleo}</td>
<td>${d.nota}</td>
<td>${d.obs || "-"}</td>
<td>${d.site}</td>
</tr>
`);

});

if(tabela){
tabela.destroy();
}

tabela=$("#tabelaDados").DataTable({
pageLength:10,
lengthMenu:[10,25,50,100],
language:{
url:"https://cdn.datatables.net/plug-ins/1.13.6/i18n/pt-BR.json"
}
});

}

function exportarCSV(){

let csv="Data,Nucleo,Nota,Observacao,Site\n";

dados.forEach(d=>{
csv+=`${d.data.toLocaleDateString()},${d.nucleo},${d.nota},"${d.obs}",${d.site}\n`;
});

let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="dados_nps.csv";
a.click();

}

</script>

</body>
</html>
