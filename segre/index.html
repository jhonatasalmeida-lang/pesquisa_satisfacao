<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesquisa de Satisfação</title>

<style>

body{
margin:0;
font-family:"Segoe UI", Arial, sans-serif;
background:linear-gradient(135deg,#0f4c81,#1fb6a6);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:#ffffff;
border-radius:20px;
padding:40px;
width:100%;
max-width:900px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

h1{
color:#0f4c81;
margin-bottom:8px;
}

h2{
margin-top:0;
color:#2c3e50;
}

.subtitulo{
color:#555;
margin-bottom:40px;
font-size:18px;
}

.menu{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

.botao{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-decoration:none;
border-radius:18px;
color:#fff;
font-weight:800;
font-size:22px;
height:160px;
transition:0.25s;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.botao span{
font-size:40px;
margin-bottom:10px;
}

.botao:hover{
transform:translateY(-5px);
box-shadow:0 15px 28px rgba(0,0,0,0.3);
}

.seafin{
background:#2980b9;
}

.sefin{
background:#27ae60;
}

.secomse{
background:#8e44ad;
}

.rodape{
margin-top:35px;
font-size:14px;
color:#777;
}

/* Responsivo */

@media(max-width:700px){

.menu{
grid-template-columns:1fr;
}

.botao{
height:120px;
font-size:20px;
}

}

</style>
</head>

<body>

</a>

</div>

</div>

</html>
