<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Dashboard NPS - URE Caieiras</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#eef2f7;
margin:0;
padding:30px;
}

.dashboard{
max-width:1600px;
margin:auto;
}

h1{
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
text-align:center;
}

.card h2{
margin:0;
font-size:34px;
}

.filtros{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:25px;
background:white;
padding:15px;
border-radius:10px;
}

select,input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
margin-bottom:30px;
}

.box{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.tags span{
background:#3498db;
color:white;
padding:6px 10px;
border-radius:20px;
margin:4px;
display:inline-block;
font-size:13px;
}

</style>

</head>

<body>

<div class="dashboard">

<h1>📊 Dashboard NPS - URE Caieiras</h1>

<div class="cards">

<div class="card">
<h2 id="media">0</h2>
<span>Média Geral</span>
</div>

<div class="card">
<h2 id="nps">0</h2>
<span>NPS</span>
</div>

<div class="card">
<h2 id="prom">0%</h2>
<span>Promotores</span>
</div>

<div class="card">
<h2 id="det">0%</h2>
<span>Detratores</span>
</div>

</div>

<div class="filtros">

<select id="filtroMes">
<option value="">Todos os meses</option>
</select>

<select id="filtroNucleo">
<option value="">Todos os núcleos</option>
</select>

<input type="text" id="buscaObs" placeholder="Buscar observação">

<button onclick="exportarCSV()">Exportar CSV</button>

</div>

<div class="grid">

<div class="box">
<canvas id="graficoNucleo"></canvas>
</div>

<div class="box">
<canvas id="graficoNotas"></canvas>
</div>

<div class="box">
<h3>Palavras mais citadas</h3>
<div id="tags" class="tags"></div>
</div>

</div>

<table id="tabela" class="display" style="width:100%"></table>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbw5F7YbtnK2IHBrDa44n701fErmknBfbYS5qbvJqTKZK0ZKXZE2xs-HSl0kxYjAxoVD/exec";

let dados=[];
let tabela;

fetch(API)
.then(r=>r.json())
.then(json=>{

dados=json.map(d=>({

data:d.Data ? new Date(d.Data).toISOString().split('T')[0] : null,
nota:Number(d.Nota)||0,
nucleo:d["Núcleo"]||"Não informado",
obs:d["Observação"]||"",
site:d["Site"]||""

}));

inicializarFiltros();
render();

});

function inicializarFiltros(){

let meses=new Set();
let nucleos=new Set();

dados.forEach(d=>{
if(d.data){
meses.add(new Date(d.data).getMonth()+1);
}
nucleos.add(d.nucleo);
});

meses.forEach(m=>{
$("#filtroMes").append(`<option value="${m}">Mês ${m}</option>`);
});

nucleos.forEach(n=>{
$("#filtroNucleo").append(`<option value="${n}">${n}</option>`);
});

$("#filtroMes").change(render);
$("#filtroNucleo").change(render);
$("#buscaObs").on("input",render);

}

function filtrar(){

let mes=$("#filtroMes").val();
let nucleo=$("#filtroNucleo").val();
let busca=$("#buscaObs").val().toLowerCase();

return dados.filter(d=>{

if(mes && new Date(d.data).getMonth()+1 != mes) return false;
if(nucleo && d.nucleo!=nucleo) return false;
if(busca && !d.obs.toLowerCase().includes(busca)) return false;

return true;

});

}

function render(){

let f=filtrar();

cards(f);
graficoNucleo(f);
graficoNotas(f);
palavras(f);
tabelaDados(f);

}

function cards(f){

if(!f.length)return;

let media=f.reduce((s,d)=>s+d.nota,0)/f.length;

let prom=f.filter(d=>d.nota>=9).length;
let det=f.filter(d=>d.nota<=6).length;

let promP=(prom/f.length)*100;
let detP=(det/f.length)*100;

let nps=promP-detP;

$("#media").text(media.toFixed(1));
$("#prom").text(promP.toFixed(0)+"%");
$("#det").text(detP.toFixed(0)+"%");
$("#nps").text(nps.toFixed(0));

}

function graficoNucleo(f){

let nucleo={};

f.forEach(d=>{
if(!nucleo[d.nucleo]) nucleo[d.nucleo]=[];
nucleo[d.nucleo].push(d.nota);
});

let labels=Object.keys(nucleo);

let medias=labels.map(n=>{
let arr=nucleo[n];
return arr.reduce((a,b)=>a+b)/arr.length;
});

new Chart(document.getElementById("graficoNucleo"),{

type:"bar",
data:{
labels:labels,
datasets:[{
label:"Média por núcleo",
data:medias
}]
}

});

}

function graficoNotas(f){

let notas={};

f.forEach(d=>{
if(!notas[d.nota]) notas[d.nota]=0;
notas[d.nota]++;
});

new Chart(document.getElementById("graficoNotas"),{

type:"bar",
data:{
labels:Object.keys(notas),
datasets:[{
label:"Distribuição das notas",
data:Object.values(notas)
}]
}

});

}

function palavras(f){

let texto=f.map(d=>d.obs).join(" ").toLowerCase();

let palavras=texto.match(/\b\w+\b/g)||[];

let cont={};

palavras.forEach(p=>{
if(p.length<4) return;
cont[p]=(cont[p]||0)+1;
});

let top=Object.entries(cont)
.sort((a,b)=>b[1]-a[1])
.slice(0,20);

let html="";

top.forEach(p=>{
html+=`<span>${p[0]}</span>`;
});

$("#tags").html(html);

}

function tabelaDados(f){

let tableData=f.map(d=>({

data:d.data,
nucleo:d.nucleo,
nota:d.nota,
obs:d.obs,
site:d.site

}));

if(tabela) tabela.destroy();

tabela=$("#tabela").DataTable({

data:tableData,

columns:[

{
data:"data",
title:"Data",
render:function(data,type){

if(type==="sort") return data;

return new Date(data).toLocaleDateString();

}
},

{data:"nucleo",title:"Núcleo"},
{data:"nota",title:"Nota"},
{data:"obs",title:"Observação"},
{data:"site",title:"Site"}

],

pageLength:10,

language:{
url:"https://cdn.datatables.net/plug-ins/1.13.6/i18n/pt-BR.json"
}

});

}

function exportarCSV(){

let csv="Data,Nucleo,Nota,Observacao,Site\n";

dados.forEach(d=>{
csv+=`${d.data},${d.nucleo},${d.nota},"${d.obs}",${d.site}\n`;
});

let blob=new Blob([csv]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="dados_nps.csv";

a.click();

}

</script>

</body>
</html>
