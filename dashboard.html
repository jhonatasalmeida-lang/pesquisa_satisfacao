<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard NPS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#f4f7fb;
margin:0;
padding:30px;
}

.dashboard{
max-width:1700px;
margin:auto;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
text-align:center;
}

.card h2{
margin:0;
font-size:34px;
}

.filtros{
display:flex;
gap:10px;
flex-wrap:wrap;
background:white;
padding:15px;
border-radius:10px;
margin-bottom:25px;
}

select,input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
margin-bottom:30px;
}

.box{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.npsClass{
font-weight:bold;
margin-top:5px;
}

</style>

</head>

<body>

<div class="dashboard">

<h1>📊 Dashboard NPS</h1>

<div class="cards">

<div class="card">
<h2 id="media">0</h2>
Média
</div>

<div class="card">
<h2 id="nps">0</h2>
NPS
<div id="npsClass" class="npsClass"></div>
</div>

<div class="card">
<h2 id="prom">0%</h2>
Promotores
</div>

<div class="card">
<h2 id="det">0%</h2>
Detratores
</div>

</div>

<div class="filtros">

<select id="filtroMes">
<option value="">Todos os meses</option>
</select>

<select id="filtroNucleo">
<option value="">Todos os núcleos</option>
</select>

<input type="text" id="buscaObs" placeholder="Buscar observação">

</div>

<div class="grid">

<div class="box">
<canvas id="velocimetro"></canvas>
</div>

<div class="box">
<canvas id="tendencia"></canvas>
</div>

<div class="box">
<canvas id="graficoNucleo"></canvas>
</div>

<div class="box">
<canvas id="graficoNotas"></canvas>
</div>

</div>

<table id="tabela" class="display" style="width:100%"></table>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbw5F7YbtnK2IHBrDa44n701fErmknBfbYS5qbvJqTKZK0ZKXZE2xs-HSl0kxYjAxoVD/exec";

let dados=[];
let tabela;

let grafVel;
let grafTrend;

fetch(API)
.then(r=>r.json())
.then(json=>{

dados=json.map(d=>({

data:d.Data ? new Date(d.Data).toISOString().split('T')[0] : null,

nota:Number(d.Nota)||0,

nucleo:
d["Núcleo"]||
d["Nucleo"]||
"Não informado",

obs:
d["Observação"]||
d["Observacao"]||
"",

site:
d["Site"]||
d["site"]||
d["Unidade"]||
d["Escola"]||
"Não informado"

}));

inicializarFiltros();
render();

});

function inicializarFiltros(){

let meses=new Set();
let nucleos=new Set();

dados.forEach(d=>{

if(d.data){
meses.add(new Date(d.data).getMonth()+1);
}

nucleos.add(d.nucleo);

});

meses.forEach(m=>{
$("#filtroMes").append(`<option value="${m}">Mês ${m}</option>`);
});

nucleos.forEach(n=>{
$("#filtroNucleo").append(`<option value="${n}">${n}</option>`);
});

$("#filtroMes").change(render);
$("#filtroNucleo").change(render);
$("#buscaObs").on("input",render);

}

function filtrar(){

let mes=$("#filtroMes").val();
let nucleo=$("#filtroNucleo").val();
let busca=$("#buscaObs").val().toLowerCase();

return dados.filter(d=>{

if(mes && new Date(d.data).getMonth()+1 != mes) return false;

if(nucleo && d.nucleo!=nucleo) return false;

if(busca && !d.obs.toLowerCase().includes(busca)) return false;

return true;

});

}

function render(){

let f=filtrar();

cards(f);
velocimetro(f);
tendencia(f);
tabelaDados(f);

}

function cards(f){

if(!f.length)return;

let media=f.reduce((s,d)=>s+d.nota,0)/f.length;

let prom=f.filter(d=>d.nota>=9).length;
let det=f.filter(d=>d.nota<=6).length;

let promP=(prom/f.length)*100;
let detP=(det/f.length)*100;

let nps=promP-detP;

$("#media").text(media.toFixed(1));
$("#prom").text(promP.toFixed(0)+"%");
$("#det").text(detP.toFixed(0)+"%");
$("#nps").text(nps.toFixed(0));

let classe="Zona de melhoria";

if(nps>=75) classe="Excelência";
else if(nps>=50) classe="Muito bom";
else if(nps<0) classe="Crítico";

$("#npsClass").text(classe);

}

function velocimetro(f){

let prom=f.filter(d=>d.nota>=9).length;
let det=f.filter(d=>d.nota<=6).length;

let promP=(prom/f.length)*100;
let detP=(det/f.length)*100;

let nps=promP-detP;

if(grafVel)grafVel.destroy();

grafVel=new Chart(document.getElementById("velocimetro"),{

type:"doughnut",

data:{
labels:["Score","Restante"],
datasets:[{
data:[nps+100,200-(nps+100)],
backgroundColor:["#22c55e","#e5e7eb"]
}]
},

options:{
rotation:270,
circumference:180,
plugins:{legend:{display:false}}
}

});

}

function tendencia(f){

let meses={};

f.forEach(d=>{

let mes=new Date(d.data).getMonth()+1;

if(!meses[mes])meses[mes]=[];

meses[mes].push(d.nota);

});

let labels=Object.keys(meses);

let medias=labels.map(m=>{

let arr=meses[m];
return arr.reduce((a,b)=>a+b)/arr.length;

});

if(grafTrend)grafTrend.destroy();

grafTrend=new Chart(document.getElementById("tendencia"),{

type:"line",

data:{
labels:labels,
datasets:[{
label:"Tendência média",
data:medias,
borderColor:"#3b82f6",
fill:false
}]
}

});

}

function tabelaDados(f){

let tableData=f.map(d=>({

data:d.data,
site:d.site,
nucleo:d.nucleo,
nota:d.nota,
obs:d.obs

}));

if(tabela){
tabela.clear().destroy();
}

tabela=$("#tabela").DataTable({

data:tableData,

columns:[

{
data:"data",
title:"Data",
render:function(data,type){

if(type==="sort")return data;

return new Date(data).toLocaleDateString("pt-BR");

}
},

{data:"site",title:"Unidade"},
{data:"nucleo",title:"Núcleo"},
{data:"nota",title:"Nota"},
{data:"obs",title:"Observação"}

],

pageLength:10,

language:{
url:"https://cdn.datatables.net/plug-ins/1.13.6/i18n/pt-BR.json"
}

});

}

</script>

</body>

</html>
